{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Editar Lugar{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">

    <label for="nome">Nome do lugar</label>
    <input 
      name="nome" 
      id="nome" 
      value="{{ request.form['nome'] or lugar['nome'] }}" 
      required
    >

    <label for="descricao">Descrição</label>
    <textarea 
      name="descricao" 
      id="descricao" 
      required
    >{{ request.form['descricao'] or lugar['descricao'] }}</textarea>

    <label for="data_visita">Data da visita</label>
    <input 
      type="date"
      name="data_visita"
      id="data_visita"
      value="{{ request.form['data_visita'] or lugar['data_visita'] }}"
      required
    >

    <input type="submit" value="Salvar">

  </form>

  <hr>

  <form action="{{ url_for('blog.delete', id=lugar['id']) }}" method="post">
    <input 
      class="danger" 
      type="submit" 
      value="Excluir"
      onclick="return confirm('Tem certeza que deseja excluir este lugar?');"
    >
  </form>

{% endblock %}
