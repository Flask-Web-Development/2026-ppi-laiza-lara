{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Novo Lugar{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">

    <label for="nome">Nome do lugar</label>
    <input name="nome" id="nome" required>

    <label for="descricao">Descrição</label>
    <textarea name="descricao" id="descricao" required></textarea>

    <label for="data_visita">Data da visita</label>
    <input 
      type="date" 
      name="data_visita" 
      id="data_visita" 
      required
    >

    <input type="submit" value="Salvar">

  </form>
{% endblock %}
